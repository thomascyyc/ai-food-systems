<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emergent System Map — AI & Food Systems</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<style>
:root {
  --void:    #040904;
  --deep:    #080e08;
  --forest:  #0e180f;
  --grove:   #162018;
  --canopy:  #1e2e20;
  --leaf:    #2e4a30;
  --sage:    #4a7a4e;
  --mist:    #7a9a7e;
  --frost:   #b8ccba;
  --snow:    #e8f0e8;
  --white:   #f4f8f4;
  --ember:   #d05828;
  --ember-lt:#e07040;
  --gold:    #c48c0c;
  --amber:   #d8a018;
  --crimson: #9a2a18;
  --sky:     #2a7090;
}

* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; }

body {
  background: var(--void);
  color: var(--snow);
  font-family: 'DM Sans', sans-serif;
  font-weight: 300;
  display: flex;
  flex-direction: column;
}

/* ── TOP BAR ── */
.topbar {
  flex-shrink: 0;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 32px;
  background: rgba(4,9,4,0.95);
  border-bottom: 1px solid var(--canopy);
  z-index: 10;
}

.topbar-left {
  display: flex;
  align-items: center;
  gap: 20px;
}

.topbar-back {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--mist);
  text-decoration: none;
  transition: color 0.2s;
}
.topbar-back:hover { color: var(--white); }
.topbar-back svg { opacity: 0.6; }

.topbar-divider {
  width: 1px;
  height: 20px;
  background: var(--canopy);
}

.topbar-title {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 14px;
  color: var(--white);
  letter-spacing: -0.02em;
}

.topbar-subtitle {
  font-size: 11px;
  color: var(--mist);
  letter-spacing: 1px;
}

.topbar-right {
  display: flex;
  align-items: center;
  gap: 8px;
}

.loop-btn {
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 5px 12px;
  border: 1px solid var(--canopy);
  background: transparent;
  color: var(--mist);
  cursor: pointer;
  transition: all 0.2s;
  font-family: 'DM Sans', sans-serif;
}
.loop-btn:hover { border-color: var(--mist); color: var(--white); }
.loop-btn.active-r1 { border-color: var(--ember); color: var(--ember); background: rgba(208,88,40,0.08); }
.loop-btn.active-r2 { border-color: var(--amber); color: var(--amber); background: rgba(216,160,24,0.08); }
.loop-btn.active-r3 { border-color: var(--sage);  color: var(--sage);  background: rgba(74,122,78,0.08); }
.loop-btn.active-r4 { border-color: var(--sky);   color: var(--sky);   background: rgba(42,112,144,0.08); }

.btn-dot {
  display: inline-block;
  width: 6px; height: 6px;
  border-radius: 50%;
  margin-right: 5px;
  vertical-align: middle;
}

/* ── MAIN CANVAS ── */
.canvas-wrap {
  flex: 1;
  position: relative;
  overflow: hidden;
}

#map-svg {
  width: 100%;
  height: 100%;
}

/* ── ANIMATED EDGES ── */
.edge.loop-active {
  stroke-dasharray: 8 4;
  stroke-dashoffset: 0;
  animation: dash-flow 1s linear infinite;
}
@keyframes dash-flow {
  to { stroke-dashoffset: -12; }
}

/* ── TOOLTIP ── */
.tooltip {
  position: absolute;
  background: var(--forest);
  border: 1px solid var(--canopy);
  padding: 14px 18px;
  max-width: 260px;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.2s;
  z-index: 20;
}
.tooltip.visible { opacity: 1; }
.tooltip-title {
  font-family: 'DM Serif Display', serif;
  font-size: 15px;
  color: var(--white);
  margin-bottom: 4px;
}
.tooltip-type {
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--mist);
  margin-bottom: 8px;
}
.tooltip-desc {
  font-size: 12px;
  line-height: 1.65;
  color: var(--frost);
}

/* ── INFO PANEL ── */
.info-panel {
  position: absolute;
  left: 24px;
  bottom: 24px;
  width: 300px;
  background: rgba(8,14,8,0.92);
  border: 1px solid var(--canopy);
  backdrop-filter: blur(12px);
  transition: all 0.4s cubic-bezier(0.16,1,0.3,1);
  z-index: 15;
}
.info-panel.hidden { transform: translateX(-340px); opacity: 0; }

.info-panel-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--canopy);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.info-loop-label {
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
}
.info-close {
  background: none;
  border: none;
  color: var(--mist);
  cursor: pointer;
  font-size: 18px;
  line-height: 1;
  padding: 0;
  transition: color 0.2s;
}
.info-close:hover { color: var(--white); }

.info-panel-body { padding: 20px; }
.info-loop-name {
  font-family: 'DM Serif Display', serif;
  font-size: 18px;
  color: var(--white);
  margin-bottom: 10px;
  line-height: 1.2;
}
.info-loop-desc {
  font-size: 12.5px;
  line-height: 1.75;
  color: var(--frost);
  margin-bottom: 16px;
}
.info-loop-path {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  align-items: center;
}
.path-node {
  font-size: 11px;
  padding: 3px 8px;
  border: 1px solid var(--canopy);
  color: var(--mist);
  font-family: 'DM Sans', sans-serif;
}
.path-arrow {
  color: var(--leaf);
  font-size: 14px;
}

/* ── LEGEND ── */
.legend {
  position: absolute;
  right: 24px;
  bottom: 24px;
  background: rgba(8,14,8,0.92);
  border: 1px solid var(--canopy);
  backdrop-filter: blur(12px);
  padding: 16px 20px;
  z-index: 15;
}
.legend-title {
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--mist);
  margin-bottom: 14px;
}
.legend-items { display: flex; flex-direction: column; gap: 10px; }
.legend-item { display: flex; align-items: center; gap: 10px; }
.legend-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
.legend-label { font-size: 11px; color: var(--frost); letter-spacing: 0.5px; }
.legend-divider { height: 1px; background: var(--canopy); margin: 8px 0; }
.legend-edge { display: flex; align-items: center; gap: 10px; }
.legend-line { width: 28px; height: 1px; position: relative; }
.legend-line::after {
  content: '▶';
  position: absolute;
  right: -6px; top: -6px;
  font-size: 10px;
}
.legend-line.reinforce { background: rgba(180,180,160,0.5); color: rgba(180,180,160,0.5); }
.legend-line.reinforce::after { color: rgba(180,180,160,0.5); }

/* ── INSTRUCTIONS ── */
.instructions {
  position: absolute;
  top: 72px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 11px;
  letter-spacing: 1.5px;
  color: var(--mist);
  text-transform: uppercase;
  pointer-events: none;
  white-space: nowrap;
  animation: fade-out 1s ease 4s forwards;
}
@keyframes fade-out {
  from { opacity: 1; }
  to   { opacity: 0; }
}
.default-hint { display: inline; }
.touch-hint   { display: none; }
@media (pointer: coarse) {
  .default-hint { display: none; }
  .touch-hint   { display: inline; }
}

/* ── NODE PANEL (mobile bottom) ── */
.node-panel {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: rgba(8,14,8,0.96);
  border-top: 1px solid var(--canopy);
  backdrop-filter: blur(12px);
  padding: 16px 56px 20px 20px;
  transform: translateY(100%);
  transition: transform 0.35s cubic-bezier(0.16,1,0.3,1);
  z-index: 30;
  max-height: 180px;
}
.node-panel.visible { transform: translateY(0); }
.node-panel-close {
  position: absolute;
  top: 12px; right: 16px;
  background: none; border: none;
  color: var(--mist); font-size: 22px;
  cursor: pointer; line-height: 1; padding: 4px;
}
.node-panel-name {
  font-family: 'DM Serif Display', serif;
  font-size: 16px; color: var(--white);
  margin-bottom: 4px;
}
.node-panel-type {
  font-size: 10px; letter-spacing: 2px;
  text-transform: uppercase; color: var(--mist);
  margin-bottom: 8px;
}
.node-panel-desc {
  font-size: 12.5px; line-height: 1.65;
  color: var(--frost);
  display: -webkit-box; -webkit-line-clamp: 3;
  -webkit-box-orient: vertical; overflow: hidden;
}

/* ── MOBILE TOPBAR ── */
@media (max-width: 700px) {
  .topbar { flex-wrap: wrap; height: auto; padding: 8px 12px; gap: 6px; }
  .topbar-subtitle { display: none; }
  .topbar-right { gap: 5px; overflow-x: auto; }
  .loop-btn { font-size: 9px; padding: 4px 8px; white-space: nowrap; }
  .legend { display: none; }
  .info-panel { left: 12px; bottom: 8px; width: calc(100vw - 24px); }
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-left">
    <a href="index.html" class="topbar-back">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M9 2L4 7L9 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      Back
    </a>
    <div class="topbar-divider"></div>
    <div>
      <div class="topbar-title">Emergent System Map</div>
      <div class="topbar-subtitle">AI & Food Systems · Canada · 2022</div>
    </div>
  </div>
  <div class="topbar-right">
    <button class="loop-btn" id="btn-r1" onclick="highlightLoop('r1')">
      <span class="btn-dot" style="background:var(--ember)"></span>R1 — Production Loop
    </button>
    <button class="loop-btn" id="btn-r2" onclick="highlightLoop('r2')">
      <span class="btn-dot" style="background:var(--amber)"></span>R2 — Degradation Loop
    </button>
    <button class="loop-btn" id="btn-r3" onclick="highlightLoop('r3')">
      <span class="btn-dot" style="background:var(--sage)"></span>R3 — Supply Loop
    </button>
    <button class="loop-btn" id="btn-r4" onclick="highlightLoop('r4')">
      <span class="btn-dot" style="background:var(--sky)"></span>R4 — Waste Loop
    </button>
    <button class="loop-btn" id="btn-clear" onclick="clearHighlight()" style="display:none">Clear</button>
    <button class="loop-btn" id="btn-reset" onclick="resetZoom()" style="display:none">⟳ Reset</button>
  </div>
</div>

<!-- CANVAS -->
<div class="canvas-wrap">
  <p class="instructions">
    <span class="default-hint">Hover nodes to explore · Scroll to zoom · Click loops to trace</span>
    <span class="touch-hint">Tap nodes to explore · Pinch to zoom</span>
  </p>

  <svg id="map-svg"></svg>

  <!-- Info panel -->
  <div class="info-panel hidden" id="info-panel">
    <div class="info-panel-header">
      <span class="info-loop-label" id="info-loop-label">Loop Detail</span>
      <button class="info-close" onclick="clearHighlight()">×</button>
    </div>
    <div class="info-panel-body">
      <div class="info-loop-name" id="info-loop-name"></div>
      <p class="info-loop-desc" id="info-loop-desc"></p>
      <div class="info-loop-path" id="info-loop-path"></div>
    </div>
  </div>

  <!-- Legend -->
  <div class="legend">
    <div class="legend-title">Legend</div>
    <div class="legend-items">
      <div class="legend-item">
        <div class="legend-dot" style="background:#d05828; box-shadow:0 0 8px rgba(208,88,40,0.6)"></div>
        <span class="legend-label">Primary Driver</span>
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:#c48c0c; box-shadow:0 0 8px rgba(196,140,12,0.5)"></div>
        <span class="legend-label">Intermediary Process</span>
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:#2a6a4a; box-shadow:0 0 8px rgba(42,106,74,0.5)"></div>
        <span class="legend-label">System Actor</span>
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:#6a3a20; box-shadow:0 0 6px rgba(106,58,32,0.5)"></div>
        <span class="legend-label">Outcome / Threat</span>
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:#1e4060; box-shadow:0 0 6px rgba(30,64,96,0.5)"></div>
        <span class="legend-label">Environmental</span>
      </div>
      <div class="legend-divider"></div>
      <div class="legend-edge">
        <div class="legend-line reinforce"></div>
        <span class="legend-label">Reinforcing (+)</span>
      </div>
    </div>
  </div>

  <!-- Tooltip -->
  <div class="tooltip" id="tooltip">
    <div class="tooltip-title" id="tt-title"></div>
    <div class="tooltip-type" id="tt-type"></div>
    <div class="tooltip-desc" id="tt-desc"></div>
  </div>

  <!-- Node panel (mobile) -->
  <div class="node-panel" id="node-panel">
    <button class="node-panel-close" id="node-panel-close">×</button>
    <div class="node-panel-name" id="node-panel-name"></div>
    <div class="node-panel-type" id="node-panel-type"></div>
    <div class="node-panel-desc" id="node-panel-desc"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
//  DATA
// ═══════════════════════════════════════════

const NODES = [
  {
    id: 'cap_values',
    label: 'Capitalist\nValues',
    type: 'driver',
    color: '#d05828',
    glow: 'rgba(208,88,40,0.5)',
    r: 36,
    desc: 'The foundational value system underpinning the food system. Profit maximization, growth, and efficiency shape every actor\'s incentives — from producers to consumers to governments.',
    typeLabel: 'Primary Driver'
  },
  {
    id: 'climate',
    label: 'Climate\nChange',
    type: 'environmental',
    color: '#1e4060',
    glow: 'rgba(30,64,96,0.6)',
    r: 32,
    desc: 'Both a product of food systems and a threat to them. Increasing temperatures, extreme weather, and sea-level rise destabilize the conditions under which food can be produced.',
    typeLabel: 'Compounding Driver'
  },
  {
    id: 'profit_motive',
    label: 'Profit\nMotive',
    type: 'intermediary',
    color: '#c48c0c',
    glow: 'rgba(196,140,12,0.4)',
    r: 28,
    desc: 'The operating principle of food producers and retailers — minimize costs, maximize revenue, capture market share. Translates capitalist values into concrete food system behaviours.',
    typeLabel: 'Intermediary Process'
  },
  {
    id: 'consumer_demand',
    label: 'Consumer\nDemands',
    type: 'intermediary',
    color: '#c48c0c',
    glow: 'rgba(196,140,12,0.4)',
    r: 28,
    desc: 'Consumer preference for low prices, year-round variety, cosmetic perfection, and convenience. Reinforces industrial farming practices and long supply chains.',
    typeLabel: 'Intermediary Process'
  },
  {
    id: 'food_industry',
    label: 'Food\nIndustry',
    type: 'actor',
    color: '#2a6a4a',
    glow: 'rgba(42,106,74,0.4)',
    r: 30,
    desc: 'Producers and retailers operating under profit-driven incentives. Actions include industrial farming, JIT delivery, supply chain expansion, cosmetic rejection of produce, and IP on seeds.',
    typeLabel: 'System Actor'
  },
  {
    id: 'government',
    label: 'Government',
    type: 'actor',
    color: '#2a6a4a',
    glow: 'rgba(42,106,74,0.4)',
    r: 26,
    desc: 'Balances tax revenue from the food industry, consumer food safety, and environmental protection. Currently disproportionately influenced by food industry lobbying.',
    typeLabel: 'System Actor'
  },
  {
    id: 'industrial_farming',
    label: 'Industrial\nFarming',
    type: 'process',
    color: '#8a4a20',
    glow: 'rgba(138,74,32,0.4)',
    r: 30,
    desc: 'Monocultures, pesticides, herbicides, industrial equipment, and mass-scale operations. Maximizes short-term production at the cost of soil health, biodiversity, and emissions.',
    typeLabel: 'System Process'
  },
  {
    id: 'supply_chains',
    label: 'Global Supply\nChains',
    type: 'process',
    color: '#8a4a20',

  {

    type: 'outcome',
    color: '#6a3a20',
    glow: 'rgba(106,58,32,0.4)',
    r: 26,
    desc: 'Canadian food systems account for 30–40% of national GHG emissions. Driven by land use (69%), energy (22%), industry (6%), and waste (3%).',

  {
    id: 'soil_deg',
    label: 'Soil\nDegradation',
    type: 'outcome',
    color: '#6a3a20',
    glow: 'rgba(106,58,32,0.4)',
    r: 26,
    desc: 'Monocultures and chemical inputs deplete soil nutrients and reduce long-term agricultural viability. Reduces arable land available for future food production.',
    typeLabel: 'System Outcome'
  },
  {
    id: 'centralization',
    label: 'Centralized\nProduction',
    type: 'outcome',
    color: '#6a3a20',
    glow: 'rgba(106,58,32,0.4)',
    r: 26,
    desc: 'Economies of scale concentrate food production in large multinationals. Communities lose food sovereignty. Wealth flows away from local producers.',
    typeLabel: 'System Outcome'
  },
  {
    id: 'food_waste',
    label: 'Food\nWaste',
    type: 'outcome',
    color: '#6a3a20',
    glow: 'rgba(106,58,32,0.4)',
    r: 26,
    desc: '40–50% of global food production is discarded. Cosmetic rejection, overproduction, and post-consumer waste. Developed nations see most waste post-consumption.',

];

const EDGES = [
  ['cap_values',      'profit_motive',    '+'],
  ['cap_values',      'consumer_demand',  '+'],

  ['cap_values',      'government',       '+'],

  r1: {
    label: 'R1',
    color: '#d05828',
    name: 'The Production Loop',
    desc: 'Profit motive drives industrial farming, which drives GHG emissions, which accelerates climate change, which threatens food security, which intensifies pressure on the profit motive to produce more.',

    edges: [

      ['supply_chains','fragility'],

  r4: {
    label: 'R4',
    color: '#2a7090',
    name: 'The Waste & Emissions Loop',
    desc: 'Overproduction driven by profit motives and cosmetic rejection standards generates massive food waste. That waste contributes to GHG emissions. Emissions accelerate climate change, which threatens yields, driving more overproduction.',
    nodes: ['industrial_farming','food_waste','ghg','climate','food_insecurity','profit_motive','industrial_farming'],
    edges: [
      ['industrial_farming','food_waste'],
      ['food_waste','ghg'],
      ['ghg','climate'],
      ['climate','food_insecurity'],
      ['food_insecurity','profit_motive'],
      ['profit_motive','industrial_farming'],
    ]
  }
};

const LAYOUT = {
  cap_values:          [160,  200],
  climate:             [1220, 240],
  profit_motive:       [340,  160],
  consumer_demand:     [340,  380],
  food_industry:       [540,  250],
  government:          [200,  450],
  industrial_farming:  [720,  160],
  supply_chains:       [720,  400],
  ghg:                 [920,  120],
  soil_deg:            [920,  300],
  centralization:      [920,  480],
  food_waste:          [760,  600],
  fragility:           [1060, 420],
  food_insecurity:     [1200, 560],
};

// ═══════════════════════════════════════════
//  D3 SETUP
// ═══════════════════════════════════════════

const BASE_W = 1400, BASE_H = 780;

// Convert edges to objects
const edgeObjects = EDGES.map(([from, to, label]) => ({ from, to, label }));

// Node lookup map
const nodeMap = {};
NODES.forEach(n => nodeMap[n.id] = n);

// Node data with layout positions
const nodeData = NODES.map(n => ({
  ...n,
  x: LAYOUT[n.id][0],
  y: LAYOUT[n.id][1],
}));

// SVG with viewBox (no manual resize needed)
const svg = d3.select('#map-svg')
  .attr('viewBox', `0 0 ${BASE_W} ${BASE_H}`)
  .attr('preserveAspectRatio', 'xMidYMid meet');

// Defs: markers + filter
const defs = svg.append('defs');

function addMarker(id, fillColor) {
  const m = defs.append('marker')
    .attr('id', id)
    .attr('markerWidth', 8).attr('markerHeight', 8)
    .attr('refX', 6).attr('refY', 3)
    .attr('orient', 'auto').attr('markerUnits', 'strokeWidth');
  m.append('path').attr('d', 'M0,0 L0,6 L8,3 z').attr('fill', fillColor);
}

addMarker('arrow-default', 'rgba(120,150,122,0.45)');
addMarker('arrow-r1',      'rgba(208,88,40,0.9)');
addMarker('arrow-r2',      'rgba(216,160,24,0.9)');
addMarker('arrow-r3',      'rgba(74,122,78,0.9)');
addMarker('arrow-r4',      'rgba(42,112,144,0.9)');
addMarker('arrow-hover',   'rgba(240,240,220,0.9)');

const glowF = defs.append('filter').attr('id','glow-node')
  .attr('x','-60%').attr('y','-60%').attr('width','220%').attr('height','220%');
glowF.append('feGaussianBlur').attr('stdDeviation',6).attr('result','blur');
const gfm = glowF.append('feMerge');
gfm.append('feMergeNode').attr('in','blur');
gfm.append('feMergeNode').attr('in','SourceGraphic');

// Map group — zoom target
const g = svg.append('g').attr('class','map-g');

// Sub-layers (order matters for z-depth)
const edgesLayer     = g.append('g').attr('class','edges-layer');
const loopGlowLayer  = g.append('g').attr('class','loop-glow-layer');
const nodesLayer     = g.append('g').attr('class','nodes-layer');
const loopLabelLayer = g.append('g').attr('class','loop-label-layer');

// ── Bezier path function (static viewBox coordinates) ──
function bezierPath(d) {
  const fn = nodeMap[d.from], tn = nodeMap[d.to];
  if (!fn || !tn) return '';
  const x1 = LAYOUT[d.from][0], y1 = LAYOUT[d.from][1];
  const x2 = LAYOUT[d.to][0],   y2 = LAYOUT[d.to][1];
  const dx = x2 - x1, dy = y2 - y1;
  const dist = Math.sqrt(dx*dx + dy*dy);
  if (dist === 0) return '';
  const nx = -dy/dist, ny = dx/dist;
  const cx = (x1+x2)/2 + nx*dist*0.15;
  const cy = (y1+y2)/2 + ny*dist*0.15;
  // Start: offset from source circle edge
  const angle0 = Math.atan2(dy, dx);
  const sx = x1 + Math.cos(angle0)*fn.r;
  const sy = y1 + Math.sin(angle0)*fn.r;
  // End: offset from target circle edge + arrowhead clearance
  const angle = Math.atan2(y2 - cy, x2 - cx);
  const ex = x2 - Math.cos(angle)*(tn.r + 4);
  const ey = y2 - Math.sin(angle)*(tn.r + 4);
  return `M ${sx} ${sy} Q ${cx} ${cy} ${ex} ${ey}`;
}

// ── Draw edges ──
edgesLayer.selectAll('.edge')
  .data(edgeObjects).enter().append('path')
  .attr('class', 'edge')
  .attr('d', bezierPath)
  .attr('fill', 'none')
  .attr('stroke', 'rgba(100,140,104,0.28)')
  .attr('stroke-width', 1.2)
  .attr('marker-end', 'url(#arrow-default)');

// ── Draw node groups at static LAYOUT positions ──
const nodeGroups = nodesLayer.selectAll('.node-group')
  .data(nodeData).enter().append('g')
  .attr('class', d => `node-group node-${d.id}`)
  .attr('transform', d => `translate(${d.x},${d.y})`);

// Glow halo (behind main circle)
nodeGroups.append('circle')
  .attr('class', 'node-glow')
  .attr('r', d => d.r + 8)
  .attr('fill', d => d.glow.replace(/[\d.]+\)$/, '0.12)'));

// Main circle — node-main class required for pulse selector
nodeGroups.append('circle')
  .attr('class', 'node-main')
  .attr('r', d => d.r)
  .attr('fill', d => d.color)
  .attr('fill-opacity', 0.85)
  .attr('stroke', d => d.color)
  .attr('data-color', d => d.color)   // store for clearHighlight reset
  .attr('stroke-width', 1.5)
  .attr('stroke-opacity', 0.6)
  .style('cursor', 'pointer');

// Labels (appended to node groups, coordinates relative to group center)
nodeGroups.each(function(d) {
  const lines   = d.label.split('\n');
  const lineH   = 13;
  const totalH  = lines.length * lineH;
  lines.forEach((line, i) => {
    d3.select(this).append('text')
      .attr('class', 'node-label')
      .attr('x', 0)
      .attr('y', -totalH/2 + lineH*0.8 + i*lineH)
      .attr('text-anchor', 'middle')
      .attr('dominant-baseline', 'middle')
      .attr('fill', '#f0f4f0')
      .attr('font-family', 'DM Sans, sans-serif')
      .attr('font-size', '11px')
      .style('pointer-events', 'none')
      .style('user-select', 'none')
      .text(line);
  });
});

// ── Zoom + Pan (d3.zoom handles mouse wheel, trackpad pinch, touch pinch) ──
const zoom = d3.zoom()
  .scaleExtent([0.25, 4])
  .on('zoom', e => {
    g.attr('transform', e.transform);
    document.getElementById('btn-reset').style.display = 'inline-block';
  });

svg.call(zoom);

function resetZoom() {
  svg.transition().duration(500).call(zoom.transform, d3.zoomIdentity);
  document.getElementById('btn-reset').style.display = 'none';
}

// ── Tooltip ──
const tooltipEl = document.getElementById('tooltip');

function positionTooltip(event) {
  const rect = document.querySelector('.canvas-wrap').getBoundingClientRect();
  let x = event.clientX - rect.left + 18;
  let y = event.clientY - rect.top  - 10;
  if (x + 280 > rect.width)  x = event.clientX - rect.left - 288;
  if (y + 160 > rect.height) y = event.clientY - rect.top  - 165;
  tooltipEl.style.left = x + 'px';
  tooltipEl.style.top  = y + 'px';
}

// ── Node interactions ──
let activeLoop = null;
const isTouch = window.matchMedia('(pointer: coarse)').matches;

nodeGroups
  .on('mouseenter', function(event, d) {
    if (isTouch) return;
    // Highlight edges connected to hovered node
    edgesLayer.selectAll('.edge').each(function(e) {
      if (e.from === d.id || e.to === d.id) {
        d3.select(this)
          .attr('stroke', 'rgba(220,220,200,0.8)')
          .attr('stroke-width', 1.8)
          .attr('marker-end', 'url(#arrow-hover)');
      } else if (!activeLoop) {
        d3.select(this).attr('stroke', 'rgba(100,140,104,0.08)');
      }
    });
    // Show floating tooltip
    document.getElementById('tt-title').textContent = d.label.replace('\n', ' ');
    document.getElementById('tt-type').textContent  = d.typeLabel;
    document.getElementById('tt-desc').textContent  = d.desc;
    tooltipEl.classList.add('visible');
    positionTooltip(event);
  })
  .on('mouseleave', function() {
    if (isTouch) return;
    if (!activeLoop) {
      edgesLayer.selectAll('.edge')
        .attr('stroke', 'rgba(100,140,104,0.28)')
        .attr('stroke-width', 1.2)
        .attr('marker-end', 'url(#arrow-default)');
    }
    tooltipEl.classList.remove('visible');
  })
  .on('mousemove', function(event) {
    if (isTouch) return;
    positionTooltip(event);
  })
  .on('click', function(event, d) {
    event.stopPropagation();
    showNodePanel(d);
  });

// Click outside nodes closes tooltip + panel
svg.on('click', function() {
  tooltipEl.classList.remove('visible');
  hideNodePanel();
});

// ── Node panel (bottom fixed, useful on mobile) ──
function showNodePanel(d) {
  document.getElementById('node-panel-name').textContent = d.label.replace('\n', ' ');
  document.getElementById('node-panel-type').textContent = d.typeLabel;
  document.getElementById('node-panel-desc').textContent = d.desc;
  document.getElementById('node-panel').classList.add('visible');
}

function hideNodePanel() {
  document.getElementById('node-panel').classList.remove('visible');
}

document.getElementById('node-panel-close').addEventListener('click', e => {
  e.stopPropagation();
  hideNodePanel();
});

// ── Loop highlight ──
function edgeKey(d) { return `${d.from}--${d.to}`; }

function highlightLoop(loopId) {
  tooltipEl.classList.remove('visible');
  if (activeLoop === loopId) { clearHighlight(); return; }
  activeLoop = loopId;
  const loop = LOOPS[loopId];

  const loopEdgeKeys = new Set(loop.edges.map(([f, t]) => `${f}--${t}`));
  const loopNodeSet  = new Set(loop.nodes);

  // Update button states
  document.querySelectorAll('.loop-btn').forEach(b =>
    b.classList.remove('active-r1','active-r2','active-r3','active-r4')
  );
  document.getElementById(`btn-${loopId}`).classList.add(`active-${loopId}`);
  document.getElementById('btn-clear').style.display = 'inline-block';

  // Dim all edges (remove animation class first)
  edgesLayer.selectAll('.edge')
    .classed('loop-active', false)
    .attr('stroke', 'rgba(100,140,104,0.06)')
    .attr('stroke-width', 1)
    .attr('stroke-opacity', 1)
    .attr('marker-end', 'url(#arrow-default)');

  // Activate loop edges (CSS class triggers dash-flow animation)
  edgesLayer.selectAll('.edge')
    .filter(d => loopEdgeKeys.has(edgeKey(d)))
    .classed('loop-active', true)
    .attr('stroke', loop.color)
    .attr('stroke-width', 2.5)
    .attr('stroke-opacity', 0.9)
    .attr('marker-end', `url(#arrow-${loopId})`);

  // Dim all nodes and labels
  nodeGroups.select('.node-main')
    .attr('fill-opacity', 0.25)
    .attr('stroke-opacity', 0.15);
  nodeGroups.selectAll('.node-label').attr('opacity', 0.25);

  // Highlight loop nodes
  nodeGroups.filter(d => loopNodeSet.has(d.id))
    .select('.node-main')
    .attr('fill-opacity', 1)
    .attr('stroke-opacity', 1)
    .attr('stroke', loop.color)
    .attr('stroke-width', 2.5);
  nodeGroups.filter(d => loopNodeSet.has(d.id))
    .selectAll('.node-label').attr('opacity', 1);

  // Glow underneath active edges
  loopGlowLayer.selectAll('*').remove();
  loop.edges.forEach(([from, to]) => {
    loopGlowLayer.append('path')
      .datum({ from, to })
      .attr('d', bezierPath)
      .attr('fill', 'none')
      .attr('stroke', loop.color)
      .attr('stroke-width', 6)
      .attr('stroke-opacity', 0.15);
  });

  // Loop centroid label
  loopLabelLayer.selectAll('*').remove();
  const [lx, ly] = loopLabelPos(loopId);
  loopLabelLayer.append('text')
    .attr('x', lx).attr('y', ly)
    .attr('text-anchor', 'middle')
    .attr('fill', loop.color)
    .attr('font-family', 'Syne, sans-serif')
    .attr('font-weight', 800)
    .attr('font-size', 14)
    .attr('opacity', 0.8)
    .text(loop.label);

  // Info panel
  const labelEl = document.getElementById('info-loop-label');
  labelEl.textContent = `${loop.label} · Reinforcing Loop`;
  labelEl.style.color  = loop.color;
  document.getElementById('info-loop-name').textContent = loop.name;
  document.getElementById('info-loop-desc').textContent = loop.desc;

  const pathEl = document.getElementById('info-loop-path');
  pathEl.innerHTML = '';
  const uniqueNodes = [...new Set(loop.nodes)];
  uniqueNodes.forEach((nid, i) => {
    const n = nodeMap[nid];
    if (!n) return;
    const span = document.createElement('span');
    span.className   = 'path-node';
    span.textContent = n.label.replace('\n', ' ');
    span.style.borderColor = loop.color;
    span.style.color       = loop.color;
    pathEl.appendChild(span);
    if (i < uniqueNodes.length - 1) {
      const arr = document.createElement('span');
      arr.className   = 'path-arrow';
      arr.textContent = '→';
      arr.style.color = loop.color;
      pathEl.appendChild(arr);
    }
  });

  document.getElementById('info-panel').classList.remove('hidden');

  // Sequential node pulse — causality travels visibly around the cycle
  setTimeout(() => pulseLoopNodes(loopId), 100);
}

function loopLabelPos(loopId) {
  const ids = [...new Set(LOOPS[loopId].nodes)];
  let sx = 0, sy = 0;
  ids.forEach(id => { sx += LAYOUT[id][0]; sy += LAYOUT[id][1]; });
  return [sx / ids.length, sy / ids.length - 20];
}

function pulseLoopNodes(loopId) {
  const path = [...new Set(LOOPS[loopId].nodes)];
  path.forEach((nodeId, i) => {
    setTimeout(() => {
      const origR = nodeMap[nodeId].r;
      nodeGroups.filter(d => d.id === nodeId)
        .select('.node-main')
        .transition().duration(200).attr('r', origR * 1.4)
        .transition().duration(300).attr('r', origR);
    }, i * 200);
  });
}

function clearHighlight() {
  activeLoop = null;
  document.querySelectorAll('.loop-btn').forEach(b =>
    b.classList.remove('active-r1','active-r2','active-r3','active-r4')
  );
  document.getElementById('btn-clear').style.display = 'none';
  document.getElementById('info-panel').classList.add('hidden');

  loopGlowLayer.selectAll('*').remove();
  loopLabelLayer.selectAll('*').remove();

  edgesLayer.selectAll('.edge')
    .classed('loop-active', false)
    .attr('stroke', 'rgba(100,140,104,0.28)')
    .attr('stroke-width', 1.2)
    .attr('stroke-opacity', 1)
    .attr('marker-end', 'url(#arrow-default)');

  // Reset node circles to their original fill color
  nodeGroups.select('.node-main')
    .attr('fill-opacity', 0.85)
    .attr('stroke-opacity', 0.6)
    .attr('stroke-width', 1.5)
    .attr('stroke', function() { return this.getAttribute('data-color'); });

  nodeGroups.selectAll('.node-label').attr('opacity', 1);
}
</script>
</body>
</html>
